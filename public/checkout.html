<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<script src="/js/app.js" defer></script>
<title>চেকআউট — NetBazar</title>
</head>
<body data-page="checkout">
<header class="site-header" id="site-header"></header>
<main class="container">
  <div class="cart-layout">
    <form class="card" id="checkout-form">
      <h2 style="font-family:var(--font-display);margin-bottom:16px">ডেলিভারির তথ্য</h2>
      <div class="form-grid">
        <div><label for="f-name">আপনার নাম *</label><input id="f-name" required minlength="2" maxlength="80" autocomplete="name"></div>
        <div><label for="f-email">ইমেইল (ঐচ্ছিক — অর্ডার কনফার্মেশন মেইল পাবেন)</label><input id="f-email" type="email" maxlength="120" autocomplete="email" placeholder="you@gmail.com"></div>
        <div><label for="f-phone">মোবাইল নম্বর *</label><input id="f-phone" required pattern="(\+8801[3-9][0-9]{8}|01[3-9][0-9]{8})" placeholder="01XXXXXXXXX বা +8801XXXXXXXXX" inputmode="tel" autocomplete="tel" title="01XXXXXXXXX (১১ ডিজিট) বা +8801XXXXXXXXX"></div>
        <div><label for="f-address">সম্পূর্ণ ঠিকানা *</label><textarea id="f-address" required minlength="8" rows="3" pattern="[A-Za-z0-9\s,;:]+" placeholder="House 12, Road 3, Mirpur, Dhaka (ইংরেজিতে)" title="ইংরেজি অক্ষর, সংখ্যা এবং কমা/সেমিকোলন/কোলন ব্যবহার করুন"></textarea>
          <small style="color:var(--ink-soft)">ঠিকানা ইংরেজিতে লিখুন — কুরিয়ার লেবেলে এটাই ছাপা হবে</small></div>
        <div>
          <label>ডেলিভারি এলাকা *</label>
          <label class="pay-option"><input type="radio" name="area" value="inside_dhaka" checked><span><span class="pt">ঢাকার ভেতরে</span></span></label>
          <label class="pay-option"><input type="radio" name="area" value="outside_dhaka"><span><span class="pt">ঢাকার বাইরে</span></span></label>
        </div>
        <div><label for="f-note">নোট (ঐচ্ছিক)</label><input id="f-note" maxlength="300" placeholder="বিশেষ কোনো নির্দেশনা"></div>
        <div class="hp-field" aria-hidden="true"><label for="f-website">Website</label><input id="f-website" tabindex="-1" autocomplete="off"></div>
        <div>
          <label>পেমেন্ট পদ্ধতি *</label>
          <label class="pay-option">
            <input type="radio" name="pay" value="bkash_full" checked>
            <span><span class="pt">অনলাইনে ফুল পেমেন্ট</span><br><span class="ps">পুরো টাকা এখনই পরিশোধ করুন — দ্রুততম প্রসেসিং</span></span>
          </label>
          <label class="pay-option">
            <input type="radio" name="pay" value="cod_advance">
            <span><span class="pt">ক্যাশ অন ডেলিভারি</span><br><span class="ps" id="cod-sub">পণ্য হাতে পেয়ে টাকা দিন</span></span>
          </label>
          <div style="margin-top:10px" id="gw-wrap"><label>পেমেন্ট করবেন যেটা দিয়ে *</label><div id="gw-list"></div></div>
          <p id="pay-note" style="font-size:.93rem;background:#fff8e8;border:1px solid #f3dfae;border-radius:10px;padding:10px 14px"></p>
        </div>
      </div>
    </form>
    <div class="card">
      <h3 style="font-family:var(--font-display);margin-bottom:10px">অর্ডার সামারি</h3>
      <div id="co-items"></div>
      <div class="coupon-row">
        <input id="coupon-input" placeholder="কুপন কোড" class="" style="border:1.5px solid var(--line);border-radius:10px;padding:10px 14px">
        <button type="button" class="btn btn-ghost" id="coupon-apply">প্রয়োগ</button>
      </div>
      <div class="summary-row"><span>সাবটোটাল</span><span id="sum-sub"></span></div>
      <div class="summary-row" id="sum-disc-row" style="display:none;color:var(--ok)"><span>ডিসকাউন্ট</span><span id="sum-disc"></span></div>
      <div class="summary-row"><span>ডেলিভারি চার্জ</span><span id="sum-del"></span></div>
      <div class="summary-row total"><span>মোট</span><span id="sum-total"></span></div>
      <button class="btn btn-primary" id="place-order" type="submit" form="checkout-form" style="width:100%;margin-top:16px">অর্ডার কনফার্ম করুন</button>
      <p style="font-size:.82rem;color:var(--ink-soft);margin-top:10px;text-align:center">কনফার্ম করলে বিকাশ পেমেন্ট পেজে নিয়ে যাওয়া হবে</p>
    </div>
  </div>
</main>
<footer class="site-footer" id="site-footer"></footer>
</body>
</html>
