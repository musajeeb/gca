<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<script src="/js/app.js" defer></script>
<title>প্রোডাক্ট — NetBazar</title>
</head>
<body data-page="collection">
<header class="site-header" id="site-header"></header>
<main class="container section">
  <div class="section-head">
    <div><span class="eyebrow">কালেকশন</span><h2 id="col-title">সব প্রোডাক্ট</h2><p id="col-desc" style="color:var(--ink-soft)"></p></div>
    <select id="col-sort" class="btn btn-ghost" aria-label="সাজান">
      <option value="newest">নতুন আগে</option>
      <option value="popular">জনপ্রিয়</option>
      <option value="price_asc">দাম: কম → বেশি</option>
      <option value="price_desc">দাম: বেশি → কম</option>
    </select>
  </div>
  <div class="product-grid" id="col-grid"></div>
  <div id="col-pager" style="display:flex;gap:8px;justify-content:center;margin-top:28px;flex-wrap:wrap"></div>
</main>
<footer class="site-footer" id="site-footer"></footer>
</body>
</html>
